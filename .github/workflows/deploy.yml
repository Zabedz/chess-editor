name: Deploy to Pages

# Manual only: start it from the Actions tab with Run workflow. Pushes never
# deploy; the Tests workflow covers push and pull-request checks. The build
# runs tsc, so a type error still stops a deploy.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Resolve base path
        id: base
        # configure-pages reports the site's path: "/chess-editor" for a project
        # page, empty for a user page or a custom domain at the root. Vite's base
        # must start and end with a slash, so normalise it here. This is what lets
        # a later custom domain (for example through Cloudflare) build at the root
        # with no code change. The output is read through env, not interpolated
        # into the script, so it cannot be treated as shell.
        env:
          BASE_PATH_RAW: ${{ steps.pages.outputs.base_path }}
        run: |
          bp="$BASE_PATH_RAW"
          [ -z "$bp" ] && bp='/'
          case "$bp" in /*) ;; *) bp="/$bp" ;; esac
          case "$bp" in */) ;; *) bp="$bp/" ;; esac
          echo "path=$bp" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
