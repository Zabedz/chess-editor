<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Position Editor</title>
    <script>
      // Apply a saved theme before first paint so there is no flash. The
      // 'theme' key must match STORAGE_KEY in src/ui/theme.ts.
      try {
        var saved = localStorage.getItem('theme')
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved)
        }
      } catch {
        // Storage can be unavailable (private mode); fall back to the OS theme.
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
